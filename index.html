<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Toolkit Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwindcss.config = {
      theme: {
        extend: {
          colors: {
            claude: {
              bg: '#f8f9fa',
              card: '#ffffff',
              accent: '#d97706',
              text: '#1f2937',
              muted: '#6b7280',
              border: '#e5e7eb',
              heading: '#111827',
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="styles.css?v=5">
</head>
<body class="bg-claude-bg text-claude-text min-h-screen">
  <header class="border-b border-claude-border px-6 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <h1 class="text-2xl font-bold">Claude Toolkit Dashboard</h1>
      <span id="lastScan" class="text-sm text-claude-muted"></span>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-8 space-y-8">
    <section id="summary" class="grid grid-cols-2 md:grid-cols-4 gap-4"></section>

    <section>
      <div id="tabBar" class="flex border-b border-claude-border mb-4">
        <button class="tab-btn active" data-tab="plugins">Plugins</button>
        <button class="tab-btn" data-tab="skills">Skills</button>
        <button class="tab-btn" data-tab="agents">Agents</button>
        <button class="tab-btn" data-tab="mcpServers">MCP Servers</button>
        <button class="tab-btn" data-tab="projects">Projects</button>
      </div>
      <div id="tabContent" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </section>

    <section>
      <h2 class="text-xl font-semibold mb-4">Usage Frequency</h2>
      <div class="bg-claude-card rounded-lg p-6 border border-claude-border">
        <canvas id="usageChart" height="300"></canvas>
        <p id="noUsageMsg" class="text-claude-muted text-center py-8 hidden">
          No usage data yet. Data will accumulate as you use Claude Code.
        </p>
      </div>
    </section>

    <section>
      <h2 class="text-xl font-semibold mb-4">Relationship Graph</h2>
      <div class="bg-claude-card rounded-lg border border-claude-border overflow-hidden">
        <div id="graph" style="height: 500px;"></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script type="module" src="js/app.js?v=5"></script>
</body>
</html>
